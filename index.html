<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배고픔 지도</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (하늘색 테마) */
        #menu_wrap {
            width: 380px;
            height: 100%;
            padding: 20px;
            background-color: #f0f8ff;
            border-right: 2px solid #a1c4fd;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .search_box {
            margin-bottom: 15px;
        }

        .search_box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #90cdf4;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .search_box button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .search_box button:hover {
            background-color: #2b6cb0;
        }

        /* 카테고리 선택 버튼 */
        .category_box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .category_box button {
            flex: 1;
            padding: 8px;
            background-color: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .category_box button.active {
            background-color: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        #placesList {
            list-style: none;
        }

        /* 검색 리스트 아이템 */
        .item {
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .item strong {
            color: #2d3748;
            font-size: 16px;
        }

        .item .address {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        .item .info {
            font-size: 13px;
            color: #4a5568;
            margin-top: 6px;
        }

        .item .recommend {
            margin-top: 8px;
            font-size: 13px;
            color: #dd6b20;
        }

        /* 팝업 스타일 */
        .custom_overlay {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #4299e1;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu_wrap">
        <h2>배고픔 지도 🗺️</h2>
        <div class="subtitle">출발지(내 위치) ➔ 목적지 사이의 맛집 탐색</div>
        
        <div class="search_box">
            <form onsubmit="handleRouteSearch(); return false;">
                <input type="text" id="destination" placeholder="도착 장소 또는 주소 입력 (예: 중학교)">
                <button type="submit">중간 지점 장소 찾기</button>
            </form>
        </div>

        <div class="category_box">
            <button id="cat_all" class="active" onclick="changeCategory('통합')">전체</button>
            <button id="cat_store" onclick="changeCategory('편의점')">🏪 편의점</button>
            <button id="cat_restaurant" onclick="changeCategory('음식점')">😋 식당</button>
            <button id="cat_cafe" onclick="changeCategory('카페')">☕ 카페</button>
        </div>
        <hr style="border: 0; height: 1px; background: #cbd5e0; margin-bottom: 15px;">
        <ul id="placesList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f3acc7b2d9346e70f5075e7a865881a0&libraries=services&autoload=false"></script>

<script>
    let map;            // 지도 객체
    let ps;             // 장소 검색 객체
    let geocoder;       // 주소 검색 객체
    let infowindow;     // 정보창 객체
    
    let startCoords = null;      // 출발지 (현재 위치 🐧) 좌표
    let destCoords = null;       // 목적지 좌표
    let midpointCoords = null;   // 두 지점의 중간 좌표
    
    let currentMarker = null;    // 현재 위치 마커 오버레이
    let destMarker = null;       // 목적지 마커 오버레이
    let markers = [];            // 중간 검색 결과 마커들을 담을 배열
    let currentCategory = '통합';  // 현재 선택된 카테고리

    // 지도 로드 후 실행
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 서울시청
            level: 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();
        geocoder = new kakao.maps.services.Geocoder();
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

        // 사용자의 현재 위치(출발지) 가져오기
        getCurrentLocation();
    });

    // 1. 현재 위치 가져오기 (출발지 설정)
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                startCoords = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(startCoords);
                displayStartMarker(startCoords);
            }, function(error) {
                console.error("위치 획득 실패, 기본값 대체:", error);
                // 권한 거부 시 기본값 지정
                startCoords = new kakao.maps.LatLng(37.566826, 126.9786567);
                displayStartMarker(startCoords);
            });
        }
    }

    // 출발지 마커 (🐧) 표시
    function displayStartMarker(position) {
        if (currentMarker) currentMarker.setMap(null);
        currentMarker = new kakao.maps.CustomOverlay({
            position: position,
            content: '<div style="font-size: 32px; cursor: default;" title="출발지 (내 위치)">🐧</div>',
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        currentMarker.setMap(map);
    }

    // 2. 검색 버튼 클릭 시 작동하는 함수
    function handleRouteSearch() {
        const destinationKeyword = document.getElementById('destination').value;

        if (!destinationKeyword.replace(/^\s+|\s+$/g, '')) {
            alert('도착 장소나 주소를 입력해주세요!');
            return false;
        }

        // 새 검색을 위해 기존 데이터 클리어 (출발지 🐧 제외하고 전부 삭제)
        clearSearchResults();

        // [A 단계] 입력값이 도로명/지번 주소인지 먼저 검사
        geocoder.addressSearch(destinationKeyword, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                // 주소인 경우 바로 좌표 처리
                const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                processDestination(coords, result[0].address_name);
            } else {
                // [B 단계] 주소가 아니라면 장소(키워드) 검색 수행 (예: "OO중학교")
                ps.keywordSearch(destinationKeyword, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        // 가장 검색 정확도가 높은 첫 번째 결과 장소를 목적지로 설정
                        const coords = new kakao.maps.LatLng(data[0].y, data[0].x);
                        processDestination(coords, data[0].place_name);
                    } else {
                        alert('도착 장소를 찾을 수 없습니다. 정확한 명칭이나 주소를 입력해주세요.');
                    }
                });
            }
        });
    }

    // 3. 목적지가 확정되었을 때 중간 지점을 계산하고 주변을 검색하는 함수
    function processDestination(coords, placeName) {
        destCoords = coords;

        // 목적지 마커 표시 (🏁 이모지로 목적지 표현)
        if (destMarker) destMarker.setMap(null);
        destMarker = new kakao.maps.CustomOverlay({
            position: destCoords,
            content: `<div style="font-size: 30px; cursor: default;" title="목적지: ${placeName}">🏁</div>`,
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        destMarker.setMap(map);

        // [중요 수학 공식] 현재 위치와 목적지의 위도/경도 중간값(Midpoint) 계산
        if (!startCoords) {
            alert("현재 위치를 로드 중입니다. 잠시 후 다시 시도해주세요.");
            return;
        }
        const midLat = (startCoords.getLat() + destCoords.getLat()) / 2;
        const midLng = (startCoords.getLng() + destCoords.getLng()) / 2;
        midpointCoords = new kakao.maps.LatLng(midLat, midLng);

        // 중간 지점 근처의 상점들 검색 시작
        searchMiddlePlaces();
    }

    // 4. 카테고리 변경 버튼 제어
    function changeCategory(category) {
        currentCategory = category;
        
        const buttons = document.querySelectorAll('.category_box button');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        if(category === '통합') document.getElementById('cat_all').classList.add('active');
        if(category === '편의점') document.getElementById('cat_store').classList.add('active');
        if(category === '음식점') document.getElementById('cat_restaurant').classList.add('active');
        if(category === '카페') document.getElementById('cat_cafe').classList.add('active');

        // 목적지가 이미 검색된 상태라면 카테고리 변경 시 즉시 재검색
        if (destCoords) {
            // 기존 마커/리스트만 지우고 재검색
            for (let i = 0; i < markers.length; i++) markers[i].setMap(null);
            markers = [];
            document.getElementById('placesList').innerHTML = '';
            infowindow.close();
            
            searchMiddlePlaces();
        }
    }

    // 5. 중간 좌표 기준 장소 검색
    function searchMiddlePlaces() {
        let searchKeyword = "";
        
        if (currentCategory === '통합') {
            searchKeyword = "맛집"; // 통합일 때는 포괄적인 맛집/편의시설 검색 유도
        } else {
            searchKeyword = currentCategory;
        }

        // 중간 지점(midpointCoords) 기준 반경 1.5km(1500m) 내의 장소들을 거리순으로 검색
        ps.keywordSearch(searchKeyword, placesSearchCB, {
            location: midpointCoords,
            radius: 1500,
            sort: kakao.maps.services.SortBy.DISTANCE
        });
    }

    // 장소 결과 수신 콜백
    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('중간 경로에 해당하는 상점 결과가 없습니다.');
        }
    }

    // 6. 지도에 마커 찍고 리스트 생성
    function displayPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();

        // 출발지와 목적지를 지도 화면 범위(Bounds)에 무조건 포함시킴
        bounds.extend(startCoords);
        bounds.extend(destCoords);

        let markerEmoji = '⭐';
        if (currentCategory === '편의점') markerEmoji = '🏪';
        if (currentCategory === '카페') markerEmoji = '☕';
        if (currentCategory === '음식점') markerEmoji = '😋';

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 이모지 커스텀 마커 생성
            const markerOverlay = new kakao.maps.CustomOverlay({
                position: placePosition,
                content: `<div class="emoji_marker" style="font-size: 26px; cursor: pointer;">${markerEmoji}</div>`,
                xAnchor: 0.5,
                yAnchor: 0.5
            });

            markerOverlay.setMap(map);
            markers.push(markerOverlay);

            // 거리 점수 기반 추천도(🍖) 계산 (중간 지점 기준의 거리 체킹)
            let distanceValue = parseInt(places[i].distance) || 500;
            let meatCount = 1;
            if (distanceValue < 200) meatCount = 5;
            else if (distanceValue < 400) meatCount = 4;
            else if (distanceValue < 700) meatCount = 3;
            else if (distanceValue < 1100) meatCount = 2;
            const meatRating = '🍖'.repeat(meatCount);

            const businessHours = "09:00 ~ 21:00 (방문 전 확인)";

            // 리스트 생성
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.style.cursor = 'pointer';
            itemEl.innerHTML = `
                <strong>${places[i].place_name}</strong>
                <div class="address">📍 ${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</div>
                <div class="info">🕒 영업시간: ${businessHours}</div>
                <div class="recommend">추천도: ${meatRating} (중간점에서 ${distanceValue}m)</div>
            `;
            
            // 마커 클릭 시 정보창(상표명, 전화번호, 상세 링크) 띄우기
            setTimeout(() => {
                const element = markerOverlay.a; // 커스텀 오버레이 DOM 참조
                if (element) {
                    element.addEventListener('click', function() {
                        openInfoWindow(places[i], placePosition);
                    });
                }
            }, 50);

            // 리스트 아이템 클릭 시 이벤트
            itemEl.onclick = function() {
                map.setCenter(placePosition);
                openInfoWindow(places[i], placePosition);
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        // 모든 마커가 잘 보이도록 지도 시점 자동 조정
        map.setBounds(bounds);
    }

    // 인포윈도우 오픈 공통 함수
    function openInfoWindow(place, position) {
        const tel = place.phone ? place.phone : '정보 없음';
        const popupContent = `
            <div class="custom_overlay">
                <strong>${place.place_name}</strong><br>
                📞 번호: ${tel}<br>
                🔗 <a href="${place.place_url}" target="_blank" style="color:#3182ce; font-weight:bold;">상세정보</a>
            </div>
        `;
        infowindow.setContent(popupContent);
        const tempMarker = new kakao.maps.Marker({ position: position });
        infowindow.open(map, tempMarker);
    }

    // 7. 검색 결과 초기화 함수 (출발지 마커는 보존)
    function clearSearchResults() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
        
        if (destMarker) {
            destMarker.setMap(null);
            destMarker = null;
        }

        infowindow.close();
        document.getElementById('placesList').innerHTML = '';
    }
</script>

</body>
</html>
