<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배고픔 지도</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (하늘색 테마) */
        #menu_wrap {
            width: 380px;
            height: 100%;
            padding: 20px;
            background-color: #f0f8ff;
            border-right: 2px solid #a1c4fd;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .search_box {
            margin-bottom: 15px;
        }

        .search_box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #90cdf4;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .search_box button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .search_box button:hover {
            background-color: #2b6cb0;
        }

        /* 카테고리 선택 탭 버튼 (음식점 제외, 편의점과 카페만 구성) */
        .category_box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .category_box button {
            flex: 1;
            padding: 10px;
            background-color: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category_box button.active {
            background-color: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        #placesList {
            list-style: none;
        }

        /* 결과 리스트 아이템 스타일 */
        .item {
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: translateY(-2px);
            border-color: #bee3f8;
        }

        .item strong {
            color: #2d3748;
            font-size: 16px;
        }

        .item .address {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        .item .info {
            font-size: 13px;
            color: #4a5568;
            margin-top: 6px;
        }

        .item .recommend {
            margin-top: 8px;
            font-size: 13px;
            color: #dd6b20;
        }

        /* 마커 클릭 팝업 윈도우 스타일 */
        .custom_overlay {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #4299e1;
            font-size: 12px;
            text-align: center;
            min-width: 150px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu_wrap">
        <h2>배고픔 지도 🗺️</h2>
        <div class="subtitle">도착지를 입력하면 중간 경로의 편의점/카페를 찾아줍니다.</div>
        
        <div class="search_box">
            <form onsubmit="handleRouteSearch(); return false;">
                <input type="text" id="destination" placeholder="도착 장소 또는 주소 입력 (예: OO중학교)">
                <button type="submit">중간 경로 상점 검색</button>
            </form>
        </div>

        <div class="category_box">
            <button id="cat_store" class="active" onclick="changeCategory('CS2')">🏪 편의점</button>
            <button id="cat_cafe" onclick="changeCategory('CE7')">☕ 카페</button>
        </div>
        <hr style="border: 0; height: 1px; background: #cbd5e0; margin-bottom: 15px;">
        <ul id="placesList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f3acc7b2d9346e70f5075e7a865881a0&libraries=services&autoload=false"></script>

<script>
    let map;            // 지도 객체
    let ps;             // 장소 검색 객체
    let geocoder;       // 주소 검색 객체
    let infowindow;     // 정보창 객체
    
    let startCoords = null;      // 출발지 (현재 위치 🐧) 좌표
    let destCoords = null;       // 목적지 (🏁) 좌표
    let midpointCoords = null;   // 중간 지점 좌표
    
    let currentMarker = null;    // 현재 위치 마커 오버레이
    let destMarker = null;       // 목적지 마커 오버레이
    let storeMarkers = [];       // 중간 결과 상점 마커들을 저장할 배열
    let currentCategoryCode = 'CS2'; // 기본 탭: 편의점(CS2)

    // 지도 및 서비스 객체 초기화
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places(map); // 지도 객체를 연동하여 카테고리 검색 최적화
        geocoder = new kakao.maps.services.Geocoder();
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

        // 기기 GPS 기반 현재 위치 받아와 출발지로 세팅
        getCurrentLocation();
    });

    // 현재 위치를 출발지로 설정
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                startCoords = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(startCoords);
                displayStartMarker(startCoords);
            }, function(error) {
                console.error("위치 정보 가져오기 실패:", error);
                startCoords = new kakao.maps.LatLng(37.566826, 126.9786567); // 실패 시 서울시청 기준
                displayStartMarker(startCoords);
            });
        }
    }

    // 출발지 🐧 표시
    function displayStartMarker(position) {
        if (currentMarker) currentMarker.setMap(null);
        currentMarker = new kakao.maps.CustomOverlay({
            position: position,
            content: '<div style="font-size: 32px; cursor: default;">🐧</div>',
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        currentMarker.setMap(map);
    }

    // 도착지 검색창 제출 시 실행되는 함수
    function handleRouteSearch() {
        const destinationKeyword = document.getElementById('destination').value;

        if (!destinationKeyword.replace(/^\s+|\s+$/g, '')) {
            alert('도착지 장소나 주소를 입력해주세요!');
            return false;
        }

        // 새 목적지를 검색하므로 기존 결과물(상점 마커, 리스트, 기존 목적지 🏁) 전부 초기화
        clearSearchResults();

        // 1. 주소 검색(지번/도로명) 시도
        geocoder.addressSearch(destinationKeyword, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                processRouteMidpoint(coords, result[0].address_name);
            } else {
                // 2. 주소가 아니라면 장소 키워드명으로 검색 시도
                ps.keywordSearch(destinationKeyword, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        // 검색 결과 중 가장 신뢰도 높은 첫 번째 장소 좌표 채택
                        const coords = new kakao.maps.LatLng(data[0].y, data[0].x);
                        processRouteMidpoint(coords, data[0].place_name);
                    } else {
                        alert('도착 장소를 찾을 수 없습니다. 명칭을 다시 확인해주세요.');
                    }
                });
            }
        });
    }

    // 목적지 좌표 확정 후 중간 지점 계산 및 카테고리(상점) 검색 호출
    function processRouteMidpoint(coords, placeName) {
        destCoords = coords;

        // 목적지 위치에만 🏁 표시 (목적지는 결과 리스트에 드가지 않음)
        destMarker = new kakao.maps.CustomOverlay({
            position: destCoords,
            content: `<div style="font-size: 30px; cursor: default;" title="도착지: ${placeName}">🏁</div>`,
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        destMarker.setMap(map);

        if (!startCoords) {
            alert("현재 위치 정보가 아직 로드되지 않았습니다.");
            return;
        }

        // 현재 위치와 목적지의 중간 좌표(Midpoint) 연산
        const midLat = (startCoords.getLat() + destCoords.getLat()) / 2;
        const midLng = (startCoords.getLng() + destCoords.getLng()) / 2;
        midpointCoords = new kakao.maps.LatLng(midLat, midLng);

        // 연산된 중간 지점 주위로 실제 상점(편의점/카페)들 탐색 시작
        searchCategoryPlaces();
    }

    // 탭 전환 핸들러 (편의점 <-> 카페)
    function changeCategory(categoryCode) {
        if (currentCategoryCode === categoryCode) return; // 같은 탭 클릭 시 무시
        
        currentCategoryCode = categoryCode;
        
        // 탭 UI 활성화 클래스 토글
        document.querySelectorAll('.category_box button').forEach(btn => btn.classList.remove('active'));
        if(categoryCode === 'CS2') document.getElementById('cat_store').classList.add('active');
        if(categoryCode === 'CE7') document.getElementById('cat_cafe').classList.add('active');

        // 목적지가 이미 등록되어 있는 상태라면 탭 전환 시 기존 마커 및 리스트를 완전히 지우고 새 카테고리만 표출
        if (destCoords) {
            clearStoreMarkersAndList();
            searchCategoryPlaces();
        }
    }

    // 카카오맵 카테고리 전용 검색 API(`categorySearch`) 호출 구조
    function searchCategoryPlaces() {
        // 중간 좌표 기준 반경 1.2km(1200m) 내 지정된 카테고리 고유 코드로 상점 필터링 검색
        ps.categorySearch(currentCategoryCode, categorySearchCB, {
            location: midpointCoords,
            radius: 1200,
            sort: kakao.maps.services.SortBy.DISTANCE // 중간점 기준 가까운 순 정렬
        });
    }

    // 카테고리 검색 결과 콜백 함수
    function categorySearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayCategoryPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('중간 경로 근처에 해당 상점이 존재하지 않습니다.');
        }
    }

    // 상점 결과 마커 바인딩 및 화면 리스트업
    function displayCategoryPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();

        // 탐색 뷰포트에 내위치(🐧)와 목적지(🏁)를 강제로 포함시켜 시야 확보
        bounds.extend(startCoords);
        bounds.extend(destCoords);

        // 현재 활성화된 카테고리에 맞는 이모지 지정 (CS2 -> 🏪, CE7 -> ☕)
        const markerEmoji = (currentCategoryCode === 'CS2') ? '🏪' : '☕';

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 상점용 이모지 마커 오버레이 객체 생성
            const markerOverlay = new kakao.maps.CustomOverlay({
                position: placePosition,
                content: `<div class="shop_marker" style="font-size: 26px; cursor: pointer;">${markerEmoji}</div>`,
                xAnchor: 0.5,
                yAnchor: 0.5
            });

            markerOverlay.setMap(map);
            storeMarkers.push(markerOverlay);

            // 중간점과의 거리를 바탕으로 추천도 🍖 생성 (가까울수록 많음)
            let distanceValue = parseInt(places[i].distance) || 500;
            let meatCount = 1;
            if (distanceValue < 200) meatCount = 5;
            else if (distanceValue < 400) meatCount = 4;
            else if (distanceValue < 700) meatCount = 3;
            else if (distanceValue < 1000) meatCount = 2;
            const meatRating = '🍖'.repeat(meatCount);

            // 리스트 엘리먼트 동적 추가
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.style.cursor = 'pointer';
            itemEl.innerHTML = `
                <strong>${places[i].place_name}</strong>
                <div class="address">📍 ${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</div>
                <div class="info">🕒 영업시간: 08:00 ~ 22:00 (유동적)</div>
                <div class="recommend">추천도: ${meatRating} (중간 지점에서 ${distanceValue}m)</div>
            `;
            
            // 마커 클릭 시 정보 팝업창 띄우기 이벤트 리스너 연동
            setTimeout(() => {
                const domElement = markerOverlay.a;
                if (domElement) {
                    domElement.addEventListener('click', function() {
                        openInfoWindow(places[i], placePosition);
                    });
                }
            }, 50);

            // 리스트 클릭 시 지도 해당 상점으로 부드럽게 매핑
            itemEl.onclick = function() {
                map.setCenter(placePosition);
                openInfoWindow(places[i], placePosition);
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        // 검색 마커들이 전부 다 화면 안에 수용되도록 맵 카메라 자동 스케일링
        map.setBounds(bounds);
    }

    // 상표명, 전화번호, 상세 웹페이지 팝업창 생성 규칙
    function openInfoWindow(place, position) {
        const tel = place.phone ? place.phone : '정보 없음';
        const popupContent = `
            <div class="custom_overlay">
                <strong>${place.place_name}</strong><br>
                📞 번호: ${tel}<br>
                🔗 <a href="${place.place_url}" target="_blank" style="color:#3182ce; font-weight:bold; text-decoration:none;">상세 페이지</a>
            </div>
        `;
        infowindow.setContent(popupContent);
        const tempMarker = new kakao.maps.Marker({ position: position });
        infowindow.open(map, tempMarker);
    }

    // 탭 전환용 상점 마커 및 데이터 클리어 함수
    function clearStoreMarkersAndList() {
        for (let i = 0; i < storeMarkers.length; i++) {
            storeMarkers[i].setMap(null);
        }
        storeMarkers = [];
        infowindow.close();
        document.getElementById('placesList').innerHTML = '';
    }

    // 완전히 새로운 목적지 검색을 위한 전체 초기화 기능
    function clearSearchResults() {
        clearStoreMarkersAndList();
        if (destMarker) {
            destMarker.setMap(null);
            destMarker = null;
        }
    }
</script>

</body>
</html>
