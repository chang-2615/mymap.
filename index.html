<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배고픔 지도</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (하늘색 테마) */
        #menu_wrap {
            width: 380px;
            height: 100%;
            padding: 20px;
            background-color: #f0f8ff;
            border-right: 2px solid #a1c4fd;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .search_box {
            margin-bottom: 15px;
        }

        .search_box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #90cdf4;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .search_box button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .search_box button:hover {
            background-color: #2b6cb0;
        }

        /* 카테고리 선택 탭 버튼 (편의점, 식당, 카페) */
        .category_box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .category_box button {
            flex: 1;
            padding: 10px;
            background-color: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category_box button.active {
            background-color: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        #placesList {
            list-style: none;
        }

        /* 결과 리스트 스타일 */
        .item {
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: translateY(-2px);
            border-color: #bee3f8;
        }

        .item strong {
            color: #2d3748;
            font-size: 16px;
        }

        .item .address {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        .item .info {
            font-size: 13px;
            color: #4a5568;
            margin-top: 6px;
        }

        .item .recommend {
            margin-top: 8px;
            font-size: 13px;
            color: #dd6b20;
        }

        /* 마커 클릭 팝업 스타일 */
        .custom_overlay {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #4299e1;
            font-size: 12px;
            text-align: center;
            min-width: 150px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu_wrap">
        <h2>배고픔 지도 🗺️</h2>
        <div class="subtitle">장소를 검색하고 카테고리를 눌러 주변 시설을 확인하세요.</div>
        
        <div class="search_box">
            <form onsubmit="handleTargetSearch(); return false;">
                <input type="text" id="keyword" placeholder="장소 또는 주소 입력 (예: 신한은행)">
                <button type="submit">장소 검색하기</button>
            </form>
        </div>

        <div class="category_box">
            <button id="cat_store" class="active" onclick="changeCategory('CS2')">🏪 편의점</button>
            <button id="cat_restaurant" onclick="changeCategory('FD6')">😋 식당</button>
            <button id="cat_cafe" onclick="changeCategory('CE7')">☕ 카페</button>
        </div>
        <hr style="border: 0; height: 1px; background: #cbd5e0; margin-bottom: 15px;">
        <ul id="placesList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f3acc7b2d9346e70f5075e7a865881a0&libraries=services&autoload=false"></script>

<script>
    let map;            // 지도 객체
    let ps;             // 장소 검색 객체
    let geocoder;       // 주소 검색 객체
    let infowindow;     // 정보창 객체
    
    let myLocationCoords = null;  // 현재 내 위치 (🐧) 좌표
    let targetCoords = null;      // 사용자가 검색한 중심 장소 (신한은행 등) 좌표
    
    let myLocationMarker = null;  // 내 위치 마커
    let targetMarker = null;      // 검색한 중심 장소 마커 (🏁)
    let shopMarkers = [];         // 주변 카테고리 상점 마커 배열
    let currentCategoryCode = 'CS2'; // 기본 선택 탭: 편의점(CS2)

    // 지도 로드 후 초기화
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 4
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();
        geocoder = new kakao.maps.services.Geocoder();
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

        // 앱 시작 시 내 위치 표시
        getMyLocation();
    });

    // GPS 현재 위치 가져오기 (🐧 마커용)
    function getMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                myLocationCoords = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(myLocationCoords);
                displayMyLocationMarker(myLocationCoords);
            }, function(error) {
                console.error("내 위치 로드 실패:", error);
                myLocationCoords = new kakao.maps.LatLng(37.566826, 126.9786567);
                displayMyLocationMarker(myLocationCoords);
            });
        }
    }

    // 내 위치 🐧 마커 표시
    function displayMyLocationMarker(position) {
        if (myLocationMarker) myLocationMarker.setMap(null);
        myLocationMarker = new kakao.maps.CustomOverlay({
            position: position,
            content: '<div style="font-size: 32px; cursor: default;">🐧</div>',
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        myLocationMarker.setMap(map);
    }

    // 사용자가 검색창에 장소(예: 신한은행)를 입력하고 검색할 때 실행
    function handleTargetSearch() {
        const searchKeyword = document.getElementById('keyword').value;

        if (!searchKeyword.replace(/^\s+|\s+$/g, '')) {
            alert('검색어를 입력해주세요!');
            return false;
        }

        // 새로운 검색이므로 기존 주변 상점 결과 마커 및 리스트 클리어
        clearShopData();
        if (targetMarker) {
            targetMarker.setMap(null);
            targetMarker = null;
        }

        // 1. 도로명/지번 주소 검색인지 먼저 확인
        geocoder.addressSearch(searchKeyword, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                processTargetLocation(coords, result[0].address_name);
            } else {
                // 2. 주소가 아니라면 일반 장소 키워드(예: 신한은행)로 검색
                ps.keywordSearch(searchKeyword, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        // 가장 검색 매칭도가 높은 첫 번째 장소의 좌표를 기준으로 설정
                        const coords = new kakao.maps.LatLng(data[0].y, data[0].x);
                        processTargetLocation(coords, data[0].place_name);
                    } else {
                        alert('장소를 찾을 수 없습니다. 정확히 입력해주세요.');
                    }
                });
            }
        });
    }

    // 검색한 기준 장소(신한은행) 위치 확정 후 처리
    function processTargetLocation(coords, placeName) {
        targetCoords = coords;

        // 사용자가 검색한 중심 장소 위치에 🏁 마커 표시
        targetMarker = new kakao.maps.CustomOverlay({
            position: targetCoords,
            content: `<div style="font-size: 30px; cursor: default;" title="검색된 장소: ${placeName}">🏁</div>`,
            xAnchor: 0.5,
            yAnchor: 0.5
        });
        targetMarker.setMap(map);
        map.setCenter(targetCoords);

        // 검색한 장소 주변의 카테고리(현재 선택된 탭) 상점들 탐색
        searchAroundPlaces();
    }

    // 카테고리 탭 클릭 시 전환 함수
    function changeCategory(categoryCode) {
        if (currentCategoryCode === categoryCode) return;
        
        currentCategoryCode = categoryCode;
        
        // 탭 활성화 클래스 변경
        document.querySelectorAll('.category_box button').forEach(btn => btn.classList.remove('active'));
        if(categoryCode === 'CS2') document.getElementById('cat_store').classList.add('active');
        if(categoryCode === 'FD6') document.getElementById('cat_restaurant').classList.add('active');
        if(categoryCode === 'CE7') document.getElementById('cat_cafe').classList.add('active');

        // 이미 검색된 장소(targetCoords)가 있다면, 기존 주변 마커를 싹 지우고 새 카테고리 상점 검색
        if (targetCoords) {
            clearShopData();
            searchAroundPlaces();
        }
    }

    // 확정된 장소(targetCoords)를 기준으로 주변 카테고리 상점 검색
    function searchAroundPlaces() {
        // 검색된 장소 기준 반경 1km (1000m) 이내의 카테고리 상점들을 거리순으로 검색
        ps.categorySearch(currentCategoryCode, categorySearchCB, {
            location: targetCoords,
            radius: 1000,
            sort: kakao.maps.services.SortBy.DISTANCE
        });
    }

    // 카테고리 검색 완료 콜백
    function categorySearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayAroundPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('이 장소 주변에는 해당 편의시설이 없습니다.');
        }
    }

    // 주변 상점들을 지도에 표시하고 리스트에 추가하는 함수
    function displayAroundPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();

        // 검색 기준 장소(🏁)를 지도 화면 범위에 포함
        bounds.extend(targetCoords);

        // 카테고리 코드별 마커 이모지 지정
        let markerEmoji = '🏪';
        if (currentCategoryCode === 'FD6') markerEmoji = '😋';
        if (currentCategoryCode === 'CE7') markerEmoji = '☕';

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 상점 이모지 마커 생성
            const markerOverlay = new kakao.maps.CustomOverlay({
                position: placePosition,
                content: `<div style="font-size: 26px; cursor: pointer;">${markerEmoji}</div>`,
                xAnchor: 0.5,
                yAnchor: 0.5
            });

            markerOverlay.setMap(map);
            shopMarkers.push(markerOverlay);

            // 검색한 장소(신한은행)로부터의 거리에 따른 추천도 🍖 계산
            let distanceValue = parseInt(places[i].distance) || 500;
            let meatCount = 1;
            if (distanceValue < 150) meatCount = 5;
            else if (distanceValue < 300) meatCount = 4;
            else if (distanceValue < 500) meatCount = 3;
            else if (distanceValue < 800) meatCount = 2;
            const meatRating = '🍖'.repeat(meatCount);

            // 왼쪽 리스트 엘리먼트 추가
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.style.cursor = 'pointer';
            itemEl.innerHTML = `
                <strong>${places[i].place_name}</strong>
                <div class="address">📍 ${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</div>
                <div class="info">🕒 영업시간: 09:00 ~ 22:00 (확인 필요)</div>
                <div class="recommend">추천도: ${meatRating} (목적지에서 ${distanceValue}m)</div>
            `;
            
            // 이모지 마커 클릭 시 상표명, 전화번호, 상세 팝업창 연동
            setTimeout(() => {
                const domElement = markerOverlay.a;
                if (domElement) {
                    domElement.addEventListener('click', function() {
                        openInfoWindow(places[i], placePosition);
                    });
                }
            }, 50);

            // 리스트 아이템 클릭 시 해당 위치로 이동 및 팝업창 표시
            itemEl.onclick = function() {
                map.setCenter(placePosition);
                openInfoWindow(places[i], placePosition);
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        // 마커들이 시야에 다 들어오도록 지도 범위 재조정
        map.setBounds(bounds);
    }

    // 상점 정보 팝업창 오픈 함수
    function openInfoWindow(place, position) {
        const tel = place.phone ? place.phone : '정보 없음';
        const popupContent = `
            <div class="custom_overlay">
                <strong>${place.place_name}</strong><br>
                📞 번호: ${tel}<br>
                🔗 <a href="${place.place_url}" target="_blank" style="color:#3182ce; font-weight:bold; text-decoration:none;">상세보기</a>
            </div>
        `;
        infowindow.setContent(popupContent);
        const tempMarker = new kakao.maps.Marker({ position: position });
        infowindow.open(map, tempMarker);
    }

    // 탭 전환 시 기존 상점 마커 및 리스트 클리어 함수
    function clearShopData() {
        for (let i = 0; i < shopMarkers.length; i++) {
            shopMarkers[i].setMap(null);
        }
        shopMarkers = [];
        infowindow.close();
        document.getElementById('placesList').innerHTML = '';
    }
</script>

</body>
</html>
